<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Comic+Neue:wght@700&family=Luckiest+Guy&family=Chewy&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
      body {
        background: #fff8e1;
        color: #222;
        font-family: 'Fredoka One', 'Chewy', 'Luckiest Guy', 'Comic Neue', 'Orbitron', Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      h1 {
        margin-top: 80px;
        font-size: 3.5rem;
        color: #ff9800;
        text-shadow: 2px 2px 8px #ffe082;
        letter-spacing: 2px;
      }
      .games-list {
        display: flex;
        flex-wrap: wrap;
        gap: 32px;
        justify-content: center;
        margin-top: 48px;
      }
      .game-card {
        text-decoration: none;
        background: #fffde7;
        border: 3px solid #ff9800;
        border-radius: 24px;
        box-shadow: 2px 2px 16px #ffe082;
        padding: 36px 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      }
      .game-card:hover, .game-card:focus {
        background: #ffe0b2;
        box-shadow: 0 0 28px #ff9800;
        transform: scale(1.04);
      }
      .game-card .game-icon {
        font-size: 4rem;
      }
      .game-card .game-title {
        font-size: 1.8rem;
        color: #ff9800;
        font-weight: bold;
      }
      .game-card .game-desc {
        font-size: 1.1rem;
        color: #555;
        text-align: center;
      }
    </style>
</head>
<body>
  <h1>🎮 Mini Games</h1>
  <div class="games-list">
    <a class="game-card" href="add/index.html">
      <span class="game-icon">➕</span>
      <span class="game-title">Math Game</span>
      <span class="game-desc">Practice addition with<br>two-digit numbers!</span>
    </a>
  </div>
</body>
</html>
